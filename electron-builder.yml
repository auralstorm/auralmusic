appId: com.auralmusic.app
productName: AuralMusic

directories:
  output: dist
  buildResources: build

electronLanguages:
  - en
  - zh-CN

files:
  - out/**
  - package.json

extraResources:
  - from: build/icons
    to: build/icons

asar: true

publish:
  - provider: github
    owner: 1769762790
    repo: auralmusic
    releaseType: release

win:
  icon: build/icons/icon.ico
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  menuCategory: AuralMusic
  deleteAppDataOnUninstall: false
  installerIcon: build/icons/icon.ico
  uninstallerIcon: build/icons/icon.ico

mac:
  icon: build/icons/icon.icns
  target:
    - target: dmg
      arch:
        - x64
        - arm64

dmg:
  title: AuralMusic
  icon: build/icons/icon.icns
  iconSize: 100
  window:
    width: 600
    height: 400
  contents:
    - x: 140
      y: 180
    - x: 460
      y: 180
      type: link
      path: /Applications

linux:
  maintainer: AuralMusic Team <noreply@auralmusic.app>
  icon: build/icons
  target:
    - AppImage
    - deb
